<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }}</title>
</head>
<body>
    <main>
        <h1>{{ title }}</h1>
        {% include 'backoffice/error.html' %}
        <form method="get">
            {{ form.as_p }}
            <button type="submit">Apply</button>
        </form>
        {% if rows %}
        <table>
            <thead>
                <tr>
                    <th>Id</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Updated</th>
                </tr>
            </thead>
            <tbody>
                {% for row in rows %}
                <tr>
                    <td><a href="{% url 'profile' row.id %}">{{ row.id }}</a></td>
                    <td>{{ row.display_name }}</td>
                    <td>{{ row.email }}</td>
                    <td>{{ row.phone }}</td>
                    <td>{{ row.updated_at }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        {% else %}
        <p>empty</p>
        {% endif %}
    </main>
</body>
</html>
