<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>
</head>
<body>
    <main>
        <h1>Login</h1>
        {% if form.errors %}
        <p>invalid login</p>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            {% if next %}
            <input type="hidden" name="next" value="{{ next }}">
            {% endif %}
            <button type="submit">Login</button>
        </form>
    </main>
</body>
</html>
