services:
  django-console:
    image: gglamer/django-console:latest
    depends_on:
      otel-collector:
        condition: service_started
    environment:
      APP_API_TOKEN: ${APP_API_TOKEN:?APP_API_TOKEN is required}
      APP_SIGNING_KEY: ${APP_SIGNING_KEY:?APP_SIGNING_KEY is required}
      APP_CORE_API_SERVICE_TOKEN: ${APP_CORE_API_SERVICE_TOKEN:?APP_CORE_API_SERVICE_TOKEN is required}
      APP_NAME: web-python-skelet
      APP_ENV: docker
      APP_HTTP_HOST: 0.0.0.0
      APP_HTTP_PORT: '8123'
      APP_DB_ENGINE: sqlite
      APP_DB_NAME: var/db.sqlite3
      APP_LOGGING_LEVEL: INFO
      APP_LOGGING_OUTPUT: otel
      APP_LOGGING_FORMAT: json
      APP_METRICS_ENABLED: 'true'
      APP_TRACING_ENABLED: 'true'
      APP_OTEL_SERVICE_NAME: web-python-skelet
      APP_OTEL_LOGS_ENDPOINT: http://otel-collector:4318/v1/logs
      APP_OTEL_METRICS_ENDPOINT: http://otel-collector:4318/v1/metrics
      APP_OTEL_TRACES_ENDPOINT: http://otel-collector:4318/v1/traces
      OTEL_METRIC_EXPORT_INTERVAL: '1000'
      APP_API_TOKEN_HEADER: X-API-Token
      APP_CORE_API_BASE_URL: http://cdp-core-api:8000
      DJANGO_SUPERUSER_USERNAME: ${DJANGO_SUPERUSER_USERNAME:-admin}
      DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL:-admin@example.com}
      DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD:?DJANGO_SUPERUSER_PASSWORD is required}
      DJANGO_SETTINGS_MODULE: adapter.http.django.settings
    ports:
      - '127.0.0.1:8123:8123'
    volumes:
      - django-console-data:/app/var
    networks:
      - web-python-net

  otel-collector:
    image: grafana/otel-lgtm:latest
    ports:
      - '127.0.0.1:3000:3000'
    volumes:
      - lgtm-data:/data
    networks:
      - web-python-net

networks:
  web-python-net:
    driver: bridge

volumes:
  lgtm-data:
  django-console-data:
    driver: local
